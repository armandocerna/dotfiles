# Plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'nhdaly/tmux-scroll-copy-mode'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1

set -g default-terminal "screen-256color"
# set -g @tinted-color 'base16-eighties'
set -g set-titles on
# set vi keybindings
set-window-option -g mode-keys vi
bind-key -Tcopy-mode-vi 'v' send -X begin-selection

# Mouse stuff
set -g mouse on

# All the scrollback buffer
set-option -g history-limit 10000

# Automatically renumber windows
set-option -g renumber-windows on

# set -g @yank_action 'copy-pipe-no-clear'
set -g @yank_selection 'primary'
set -g @yank_selection_mouse 'clipboard'

# Smart pane switching with awareness of vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
# bind -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Reorder windows
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# fix garbage when using clipboard
set-option -s set-clipboard off

set -g @rose_pine_variant 'main'
set -g @rose_pine_date_time '%Y-%m-%d %H:%M'
set -g @rose_pine_status_right_prepend_section '#{battery_status_bg} #{battery_icon} #{battery_percentage}'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_status_left_append_section ''
# set -g @rose_pine_disable_active_window_menu 'off'
