# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-battery'

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g set-titles on
set -g focus-events on

# vi keybindings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Mouse
set -g mouse on

# Scrollback
set-option -g history-limit 100000

# Automatically renumber windows
set-option -g renumber-windows on

set -g @yank_selection 'primary'
set -g @yank_selection_mouse 'clipboard'

# Smart pane switching with awareness of vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Reorder windows
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# OSC 52 clipboard
set-option -s set-clipboard on

# Update Wayland display on reattach
set-option -g update-environment "WAYLAND_DISPLAY DISPLAY"

# Pane index starts at 1
set -g pane-base-index 1

# Tokyo Night theme (hand-rolled)
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Left: session name (turns yellow on prefix)
set -g status-left-length 30
set -g status-left "#[fg=#1a1b26,bg=#{?client_prefix,#e0af68,#7aa2f7},bold] #S "

# Right: date and time
set -g status-right-length 120
set -g status-right "#[fg=#565f89]#(kubectl config current-context 2>/dev/null) #([ -d /sys/class/power_supply/BAT0 ] && echo \"#{battery_percentage} |\" ) %Y-%m-%d #[fg=#1a1b26,bg=#7aa2f7,bold] %H:%M "

# Window tabs
set -g window-status-format "#[fg=#565f89] #I:#W#{?window_zoomed_flag, [Z],} "
set -g window-status-current-format "#[fg=#c0caf5,bg=#24283b,bold] #I:#W#{?window_zoomed_flag,#[fg=#e0af68] [Z],} "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7"

# Messages
set -g message-style "bg=#24283b,fg=#c0caf5"
set -g clock-mode-colour "#7aa2f7"

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
